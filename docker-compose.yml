# 研修用の共通開発環境。
# `docker compose up -d` で PHP8.0 / MySQL8 / Nginx / MailHog が同じバージョンで立ち上がります。
version: "3.8"

services:
  # PHP (Laravel 本体)
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: member_app
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  # Web サーバ (Nginx) — ブラウザからのアクセス先
  web:
    image: nginx:1.25-alpine
    container_name: member_web
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # データベース (MySQL)
  db:
    image: mysql:8.0
    container_name: member_db
    environment:
      MYSQL_DATABASE: member_management
      MYSQL_USER: member
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Tokyo
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  # メール確認用 (受信箱:http://localhost:8025)
  mailhog:
    image: mailhog/mailhog
    container_name: member_mailhog
    ports:
      - "8025:8025"

volumes:
  db-data:
